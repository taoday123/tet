    // 2. Hàm Search (Dùng DATA_MASTER vừa tạo)
    function showSuggestions() {
        const input = document.getElementById('search-input');
        const resultsContainer = document.getElementById('search-results');
        const keyword = input.value.toLowerCase().trim();

        if (keyword.length < 1) {
            resultsContainer.classList.add('hidden');
            return;
        }

        const matches = DATA_MASTER.filter(item => 
            item.title.toLowerCase().includes(keyword)
        );

        if (matches.length > 0) {
            resultsContainer.classList.remove('hidden');
            resultsContainer.innerHTML = matches.slice(0, 10).map(item => `
                <a href="${item.slug}/index.html" class="flex items-center gap-3 p-2 border-b border-white/5 hover:bg-white/10 transition-all">
                    <img src="${item.slug}/cover.jpg" class="w-10 h-14 object-cover rounded" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="flex-1 min-w-0 text-left">
                        <div class="text-[12px] font-bold text-white truncate">${item.title}</div>
                        <div class="text-[10px] text-cyan-400 font-bold">Chương: ${item.chap}</div>
                    </div>
                </a>
            `).join('');
        } else {
            resultsContainer.innerHTML = '<div class="p-4 text-xs text-center text-gray-500">Không tìm thấy truyện...</div>';
            resultsContainer.classList.remove('hidden');
        }
    }

    // 3. Hàm hiển thị danh sách Bookmark (Giữ nguyên logic localStorage)
    function renderFollows() {
        const listContainer = document.getElementById('follow-list');
        const emptyState = document.getElementById('empty-state');
        const bks = JSON.parse(localStorage.getItem('m_bks') || '[]');

        if (bks.length === 0) {
            listContainer.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }

        emptyState.classList.add('hidden');
        listContainer.innerHTML = bks.map(item => `
            <div class="comic-card rounded-xl overflow-hidden relative group">
                <a href="${item.slug}/index.html" class="block">
                    <div class="aspect-[3/4] overflow-hidden">
                        <img src="${item.slug}/cover.jpg" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <div class="p-3 bg-[#1a1c23]">
                        <h3 class="text-sm font-bold text-gray-200 truncate group-hover:text-pink-500">${item.title}</h3>
                    </div>
                </a>
                <button onclick="removeOne('${item.slug}')" class="absolute top-2 right-2 w-8 h-8 rounded-full btn-delete flex items-center justify-center shadow-lg">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        `).join('');
    }

    function removeOne(slug) {
        if(confirm('Ngừng theo dõi bộ này?')) {
            let bks = JSON.parse(localStorage.getItem('m_bks') || '[]');
            bks = bks.filter(x => x.slug !== slug);
            localStorage.setItem('m_bks', JSON.stringify(bks));
            renderFollows();
        }
    }

    function clearAllFollows() {
        if(confirm('Xóa sạch tủ truyện?')) {
            localStorage.setItem('m_bks', '[]');
            renderFollows();
        }
    }

    // Đóng search khi click ngoài
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            document.getElementById('search-results').classList.add('hidden');
        }
    });

    window.addEventListener('DOMContentLoaded', renderFollows);
