function showSuggestions() {
    const input = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    if (!input || !resultsContainer) return;

    const keyword = input.value.toLowerCase().trim();

    if (keyword.length < 1) {
        resultsContainer.classList.add('hidden');
        return;
    }

    // Lọc từ mảng allComicsData
    const matches = allComicsData.filter(item => 
        item.title.toLowerCase().includes(keyword)
    );

    if (matches.length > 0) {
        resultsContainer.classList.remove('hidden');
        resultsContainer.innerHTML = matches.slice(0, 8).map(item => `
            <a href="../../../${item.slug}/index.html" class="search-item flex items-center gap-3 p-2 border-b border-white/5 transition-all hover:bg-white/5">
                <img src="${item.thumb}" class="w-10 h-14 object-cover rounded shadow-md">
                <div class="flex-1 min-w-0 text-left">
                    <div class="text-[12px] font-bold text-white truncate">${item.title}</div>
                    <div class="text-[10px] text-yellow-500 mt-1 uppercase font-bold">${item.chap}</div>
                </div>
            </a>
        `).join('');
    } else {
        resultsContainer.innerHTML = '<div class="p-4 text-xs text-gray-400 italic text-center">Không tìm thấy bí kíp...</div>';
        resultsContainer.classList.remove('hidden');
    }
}

// 4. Khởi chạy khi trang load
document.addEventListener('DOMContentLoaded', function() {
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }
    updateButtonText();

    // Đóng bảng gợi ý khi click ra ngoài
    document.addEventListener('click', (e) => {
        const resultsContainer = document.getElementById('search-results');
        if (resultsContainer && !e.target.closest('.search-container')) {
            resultsContainer.classList.add('hidden');
        }
    });
});
